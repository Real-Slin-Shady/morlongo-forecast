name: Update Forecast

on:
  schedule:
    # Run at 05:00 and 17:00 UTC (06:00 and 18:00 CET)
    - cron: '0 5,17 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests xgboost numpy

      - name: Generate forecast
        run: python generate_forecast.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/forecast.json
          git diff --staged --quiet || git commit -m "Update forecast $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
