name: Update Forecast & Observations

on:
  schedule:
    # Run every 30 minutes for Netatmo observations
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests xgboost numpy scikit-learn torch joblib

      - name: Fetch Netatmo observations
        env:
          NETATMO_CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          NETATMO_CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          NETATMO_REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
        run: python fetch_observations.py
        continue-on-error: true  # Don't fail if Netatmo is down

      - name: Check if forecast should run
        id: check_forecast
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          # Run forecast every 2 hours (at even hours, minute 0 or close to it)
          if [ $((10#$HOUR % 2)) -eq 0 ] && [ $((10#$MINUTE)) -lt 35 ]; then
            echo "run_forecast=true" >> $GITHUB_OUTPUT
          else
            echo "run_forecast=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate debiased forecast
        if: steps.check_forecast.outputs.run_forecast == 'true' || github.event_name == 'workflow_dispatch'
        run: python generate_forecast_v4.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/forecast.json docs/observations.json docs/forecast_history.json
          git diff --staged --quiet || git commit -m "Update forecast & observations $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
